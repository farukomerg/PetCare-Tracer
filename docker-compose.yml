services:
  # ─────────────── Veritabanları ───────────────
  postgres:
    image: postgres:17
    container_name: petcare-postgres
    environment:
      POSTGRES_DB: petcare_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./db/03_add_user_role.sql:/docker-entrypoint-initdb.d/03_add_user_role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petcare_tracker"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:8
    container_name: petcare-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────── Mikroservisler ───────────────
  user-service:
    build:
      context: ./microservices/user-service
      dockerfile: Dockerfile
    container_name: petcare-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petcare_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  pet-service:
    build:
      context: ./microservices/pet-service
      dockerfile: Dockerfile
    container_name: petcare-pet-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petcare_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  care-service:
    build:
      context: ./microservices/care-service
      dockerfile: Dockerfile
    container_name: petcare-care-service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petcare_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/petcare_tracker_logs
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ─────────────── API Gateway ───────────────
  gateway:
    build:
      context: ./microservices/gateway
      dockerfile: Dockerfile
    container_name: petcare-gateway
    depends_on:
      user-service:
        condition: service_healthy
      pet-service:
        condition: service_healthy
      care-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  # ─────────────── (Opsiyonel) Monolitik Backend ───────────────
  # Not: Monolitik backend artık devre dışı — gateway üzerinden mikroservisler kullanılıyor.
  # Yedek olarak çalıştırmak için aşağıdaki bloğu uncomment edin ve gateway'i kapatın.
  #
  # backend:
  #   build:
  #     context: ./backend/petcare-backend
  #     dockerfile: Dockerfile
  #   container_name: petcare-backend
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     mongo:
  #       condition: service_healthy
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petcare_tracker
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #     SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/petcare_tracker_logs
  #     SERVER_PORT: 8080
  #   ports:
  #     - "8080:8080"

  # ─────────────── İzleme ───────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: petcare-prometheus
    depends_on:
      - gateway
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: petcare-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

  k6:
    image: grafana/k6:0.53.0
    container_name: petcare-k6
    profiles:
      - loadtest
    depends_on:
      - gateway
    environment:
      BASE_URL: http://gateway:8080
    volumes:
      - ./tests/k6:/scripts:ro
    entrypoint: ["k6"]

volumes:
  postgres_data:
  mongo_data:
  grafana_data:
